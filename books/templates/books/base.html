<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Lumina Reader — читайте книги онлайн">
    <title>{% block title %}Lumina Reader{% endblock %}</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>

    <style>
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; padding: 0; background: #000; }
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(3px) saturate(120%);
            -webkit-backdrop-filter: blur(3px) saturate(120%);
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        .specular-highlight::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.25) 0%, transparent 40%);
            pointer-events: none;
            border-radius: inherit;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
        .theme-light { background-color: #fcfcfc !important; color: #1a1a1a !important; }
        .theme-light .glass { background: rgba(0,0,0,0.05); border-color: rgba(0,0,0,0.1); color: #1a1a1a; }
        .theme-light .text-white\/90 { color: #1a1a1a !important; }
        .theme-light .text-white\/40 { color: #1a1a1a / 50% !important; }
        
        .theme-sepia { background-color: #f4ecd8 !important; color: #433422 !important; }
        .theme-sepia .glass { background: rgba(67, 52, 34, 0.05); border-color: rgba(67, 52, 34, 0.1); color: #433422; }
        .theme-sepia .text-white\/90 { color: #433422 !important; }
        .theme-sepia .text-white\/40 { color: #433422 / 50% !important; }

        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .slide-up { animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* Критические стили ридера (чтобы не зависеть от CDN) */
        .reader-container {
            position: fixed;
            inset: 0;
            z-index: 100;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background-color: #0d0d0f;
            color: white;
        }
        .reader-scroll-area {
            position: absolute;
            inset: 0;
            overflow-y: auto;
            padding-top: 8rem;
            padding-bottom: 12rem;
            z-index: 10;
        }
        .reader-text-container {
            max-width: 42rem;
            margin-left: auto;
            margin-right: auto;
            width: 100%;
            padding-left: 1.5rem;
            padding-right: 1.5rem;
        }
        @media (min-width: 768px) {
            .reader-text-container {
                padding-left: 3rem;
                padding-right: 3rem;
            }
        }
        .text-center-force { text-align: center; }

        .htmx-indicator { display: none; }
        .htmx-request .htmx-indicator { display: inline-flex; }
        .htmx-request.htmx-indicator { display: inline-flex; }
    </style>
</head>
<body class="bg-black text-white overflow-x-hidden selection:bg-blue-500/30"
      hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'>

    <div id="root" class="relative min-h-screen w-full">
        <div class="fixed inset-0 z-0 bg-black pointer-events-none"></div>

        <main id="main-content" class="relative z-10 w-full min-h-screen flex flex-col items-center">
            {% block content %}{% endblock %}
        </main>

        {% include "books/partials/tab_bar.html" %}
    </div>

    <!-- Safelist динамических классов для ридера, чтобы Tailwind CDN скомпилировал их при первой загрузке -->
    <div class="hidden text-white/80 leading-[1.9] text-justify tracking-wide mb-6 mt-12 mb-12 text-center text-3xl md:text-4xl font-bold text-white/90 text-2xl opacity-70 italic border-l-4 border-white/20 pl-4"></div>
</body>
</html>
