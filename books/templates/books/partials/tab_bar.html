{% if is_htmx and not hide_tabbar %}
<nav id="tab-bar" class="fixed bottom-8 left-1/2 -translate-x-1/2 z-50 transition-all duration-500" hx-swap-oob="true">
{% elif not hide_tabbar %}
<nav id="tab-bar" class="fixed bottom-8 left-1/2 -translate-x-1/2 z-50 transition-all duration-500">
{% else %}
<nav id="tab-bar" class="hidden" {% if is_htmx %}hx-swap-oob="true"{% endif %}>
{% endif %}
{% if not hide_tabbar %}
    <div class="glass px-8 py-3 rounded-[40px] flex items-center gap-8 specular-highlight relative shadow-2xl hover:scale-105 active:scale-95 transition-transform duration-300">
        <!-- Библиотека -->
        <a href="{% url 'books:index' %}" hx-get="{% url 'books:index' %}" hx-target="#main-content" hx-push-url="true"
           class="flex flex-col items-center gap-1 group {% if active_tab != 'library' %}opacity-40 hover:opacity-100 transition-opacity{% endif %}">
            <div class="w-6 h-6 flex items-center justify-center {% if active_tab == 'library' %}rounded-full bg-blue-500/80 shadow-[0_0_15px_rgba(59,130,246,0.5)]{% endif %}">
                <svg class="w-4 h-4 {% if active_tab == 'library' %}text-white{% else %}text-white group-hover:scale-110 transition-transform{% endif %}" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
                </svg>
            </div>
            <span class="text-[10px] font-medium {% if active_tab == 'library' %}text-blue-400{% else %}text-white{% endif %}">Библиотека</span>
        </a>

        <!-- Чтение -->
        <a href="{% url 'books:last_read' %}" hx-get="{% url 'books:last_read' %}" hx-target="#main-content" hx-push-url="true"
           class="flex flex-col items-center gap-1 group {% if active_tab != 'reading' %}opacity-40 hover:opacity-100 transition-opacity{% endif %}">
            <div class="w-6 h-6 flex items-center justify-center {% if active_tab == 'reading' %}rounded-full bg-blue-500/80 shadow-[0_0_15px_rgba(59,130,246,0.5)]{% endif %}">
                <svg class="w-4 h-4 {% if active_tab == 'reading' %}text-white{% else %}text-white group-hover:scale-110 transition-transform{% endif %}" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
                </svg>
            </div>
            <span class="text-[10px] font-medium {% if active_tab == 'reading' %}text-blue-400{% else %}text-white{% endif %}">Чтение</span>
        </a>

        <!-- Избранное -->
        <a href="{% url 'books:favorites' %}" hx-get="{% url 'books:favorites' %}" hx-target="#main-content" hx-push-url="true"
           class="flex flex-col items-center gap-1 group {% if active_tab != 'favorites' %}opacity-40 hover:opacity-100 transition-opacity{% endif %}">
            <div class="w-6 h-6 flex items-center justify-center {% if active_tab == 'favorites' %}rounded-full bg-blue-500/80 shadow-[0_0_15px_rgba(59,130,246,0.5)]{% endif %}">
                <svg class="w-4 h-4 {% if active_tab == 'favorites' %}text-white{% else %}text-white group-hover:scale-110 transition-transform{% endif %}" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
                </svg>
            </div>
            <span class="text-[10px] font-medium {% if active_tab == 'favorites' %}text-blue-400{% else %}text-white{% endif %}">Избранное</span>
        </a>
    </div>
{% endif %}
</nav>
