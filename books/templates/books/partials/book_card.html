<div class="book-card group relative flex flex-col gap-3 slide-up" id="book-{{ book.id }}">
    <a href="{% url 'books:book_detail' book.id %}"
       hx-get="{% url 'books:book_detail' book.id %}"
       hx-target="#main-content"
       hx-swap="innerHTML"
       hx-push-url="true"
       class="block">
        <div class="relative aspect-[2/3] w-full rounded-[24px] overflow-hidden transition-all duration-500 group-hover:scale-[1.05] group-hover:-translate-y-2 group-active:scale-95 shadow-xl group-hover:shadow-2xl group-hover:shadow-blue-500/10">
            {% if book.cover %}
                <img src="{{ book.cover.url }}" alt="{{ book.title }}"
                     class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
            {% else %}
                <div class="w-full h-full bg-gradient-to-br from-blue-900/40 to-purple-900/40 flex items-end p-4">
                    <svg class="w-10 h-10 text-white/20 mx-auto mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1"
                            d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
                    </svg>
                </div>
            {% endif %}
            {% if book.reading_progress > 0 %}
                <div class="absolute bottom-3 left-3 right-3 glass py-1.5 px-3 rounded-[20px] text-[10px] font-bold tracking-widest uppercase flex items-center justify-between">
                    <span>{{ book.reading_progress }}%</span>
                    <div class="w-12 h-1 bg-white/20 rounded-full overflow-hidden">
                        <div class="h-full bg-blue-400 rounded-full" style="width: {{ book.reading_progress }}%"></div>
                    </div>
                </div>
            {% endif %}
        </div>
        <div class="px-3 py-2 mt-2 glass rounded-2xl transition-all group-hover:bg-white/5">
            <h3 class="text-sm font-semibold truncate group-hover:text-blue-400 transition-colors">{{ book.title }}</h3>
            <p class="text-xs text-white/40 truncate">{{ book.author }}</p>
        </div>
    </a>
    <button class="absolute top-2 right-2 w-7 h-7 rounded-full bg-black/60 text-white/40 hover:text-red-400 hover:bg-black/80 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all z-10"
            hx-delete="{% url 'books:delete_book' book.id %}"
            hx-target="#book-{{ book.id }}"
            hx-swap="outerHTML"
            hx-confirm="Удалить «{{ book.title }}»?">
        <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"/>
        </svg>
    </button>
</div>
