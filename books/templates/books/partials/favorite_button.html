<button id="favorite-btn-{{ book.id }}"
        hx-post="{% url 'books:toggle_favorite' book.id %}"
        hx-swap="outerHTML"
        class="w-10 h-10 rounded-full flex items-center justify-center transition-all active:scale-90 group {% if book.is_favorite %}bg-yellow-500/30 text-yellow-400 border border-yellow-500/40 shadow-[0_0_15px_rgba(234,179,8,0.2)]{% else %}glass text-white/50 hover:text-white{% endif %}">
    <svg class="w-5 h-5 {% if book.is_favorite %}fill-current{% endif %}" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
    </svg>
</button>
