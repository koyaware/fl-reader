{% include "books/partials/tab_bar.html" %}

<div class="w-full max-w-4xl px-6 py-12 pb-32 fade-in">
    <header class="flex flex-col gap-6 mb-12">
        <h1 class="text-3xl font-bold tracking-tight px-2">Моя библиотека</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <!-- Поиск по локальной библиотеке -->
            <div class="glass px-5 py-4 rounded-[32px] specular-highlight relative flex items-center gap-3 transition-colors focus-within:bg-white/5">
                <svg class="w-5 h-5 text-white/50 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                </svg>
                <input id="library-search-input"
                       type="text"
                       name="q"
                       placeholder="Поиск в библиотеке..."
                       autocomplete="off"
                       class="bg-transparent border-none outline-none text-sm w-full placeholder:text-white/30 text-white"
                       hx-get="{% url 'books:library_search' %}"
                       hx-target="#book-grid"
                       hx-swap="outerHTML"
                       hx-trigger="input changed delay:300ms"
                       hx-indicator="#library-spinner">
                <span id="library-spinner" class="htmx-indicator shrink-0">
                    <svg class="w-4 h-4 animate-spin text-white/50" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
                    </svg>
                </span>
            </div>

            <!-- Поиск по Флибусте -->
            <form id="flibusta-search-form"
                  hx-get="{% url 'books:search' %}"
                  hx-target="#flibusta-results"
                  hx-swap="innerHTML"
                  hx-indicator="#flibusta-spinner"
                  class="glass px-5 py-4 rounded-[32px] specular-highlight relative flex items-center gap-3 transition-colors focus-within:bg-white/5">
                <svg class="w-5 h-5 text-blue-400/70 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"/>
                </svg>
                <input type="text" name="q" placeholder="Найти на Флибусте..."
                       class="bg-transparent outline-none text-sm w-full text-white placeholder:text-white/30">
                <button type="submit" class="shrink-0 p-1 rounded-full hover:bg-white/10 text-white/50 hover:text-white transition-colors">
                    <span id="flibusta-spinner" class="htmx-indicator hidden max-w-[16px]">
                        <svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
                        </svg>
                    </span>
                    <svg class="w-5 h-5 [&.htmx-request]:hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"/>
                    </svg>
                </button>
            </form>
        </div>
    </header>

    <div id="flibusta-results" class="mb-10 empty:hidden"></div>

    {% include "books/partials/book_grid.html" %}
</div>
