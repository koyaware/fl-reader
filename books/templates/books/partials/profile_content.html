{% include "books/partials/tab_bar.html" %}

<div class="w-full max-w-4xl px-6 py-12 pb-32 fade-in">
    <header class="flex flex-col gap-6 mb-12 px-2">
        <h1 class="text-3xl font-bold tracking-tight">Профиль</h1>
        <p class="text-white/50 text-sm">Настройки вашего аккаунта и статистика чтения.</p>
    </header>

    <div class="space-y-6">
        <!-- User Info Card -->
        <div class="glass p-8 rounded-[32px] flex items-center gap-6 relative overflow-hidden group">
            <div class="absolute inset-0 bg-blue-500/5 opacity-0 group-hover:opacity-100 transition-opacity"></div>
            <div class="w-20 h-20 rounded-3xl bg-blue-500/20 flex items-center justify-center text-blue-400 shrink-0 border border-blue-500/30">
                <svg class="w-10 h-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                </svg>
            </div>
            <div class="flex-1 min-w-0">
                <h3 class="text-xl font-bold mb-1">Гость</h3>
                <p class="text-white/40 text-xs uppercase tracking-widest font-semibold">Новичок</p>
            </div>
        </div>

        <!-- Stats Grid -->
        <div class="grid grid-cols-2 gap-4">
            <div class="glass p-6 rounded-[32px] relative overflow-hidden">
                <div class="text-2xl font-bold mb-1">{{ books.count|default:"0" }}</div>
                <div class="text-[10px] text-white/40 uppercase tracking-widest font-bold">Книг в библиотеке</div>
            </div>
            <div class="glass p-6 rounded-[32px] relative overflow-hidden">
                <div class="text-2xl font-bold mb-1">0</div>
                <div class="text-[10px] text-white/40 uppercase tracking-widest font-bold">Прочитано страниц</div>
            </div>
        </div>

        <!-- Settings Links (Placeholders) -->
        <div class="glass rounded-[32px] overflow-hidden divide-y divide-white/5">
            <button class="w-full flex items-center justify-between p-6 hover:bg-white/5 transition-colors text-left group">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 rounded-2xl glass flex items-center justify-center text-white/40 group-hover:text-white transition-colors">
                        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                        </svg>
                    </div>
                    <span class="font-medium">Параметры ридера</span>
                </div>
                <svg class="w-5 h-5 text-white/20 group-hover:text-white transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                </svg>
            </button>

            <button class="w-full flex items-center justify-between p-6 hover:bg-red-500/10 transition-colors text-left group">
                <div class="flex items-center gap-4 text-red-400/80 group-hover:text-red-400 transition-colors">
                    <div class="w-10 h-10 rounded-2xl glass flex items-center justify-center">
                        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                        </svg>
                    </div>
                    <span class="font-medium">Выйти</span>
                </div>
            </button>
        </div>
    </div>
</div>
